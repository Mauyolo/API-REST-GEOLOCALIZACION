<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GeoOSM - Dashboard</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg); 
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 800px; }

        header { text-align: center; margin-bottom: 30px; }

        .grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
            margin-bottom: 20px; 
        }

        .card { 
            background: var(--card); 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); 
        }

        h2, h3 { margin-top: 0; color: var(--primary); }

        .input-group { margin-bottom: 10px; }
        label { display: block; font-size: 0.8em; font-weight: bold; margin-bottom: 4px; }
        input { 
            width: 90%; 
            padding: 8px; 
            border: 1px solid #cbd5e1; 
            border-radius: 6px; 
            font-family: monospace; 
        }

        button { 
            width: 100%; 
            padding: 12px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }

        .results { 
            margin-top: 20px; 
            display: flex; 
            justify-content: space-around; 
            background: #eff6ff; 
            padding: 15px; 
            border-radius: 8px; 
        }

        .stat { text-align: center; }
        .stat-val { display: block; font-size: 1.5em; font-weight: bold; color: var(--primary); }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e2e8f0; font-size: 0.9em; }
        th { background: #f1f5f9; }

        .address-text { font-size: 0.85em; color: #64748b; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2> GeoOSM Express</h2>
        <p>Laboratorio de Tecnologías Emergentes [cite: 2, 4]</p>
    </header>

    <div class="grid">
        <div class="card">
            <h3>Origen</h3>
            <div class="input-group">
                <label>Latitud</label>
                <input id="oLat" value="-16.414005" />
            </div>
            <div class="input-group">
                <label>Longitud</label>
                <input id="oLon" value="-71.515773" />
            </div>
            <div id="dirOrigen" class="address-text"></div>
        </div>

        <div class="card">
            <h3> Destino</h3>
            <div class="input-group">
                <label>Latitud</label>
                <input id="dLat" value="-16.406547" />
            </div>
            <div class="input-group">
                <label>Longitud</label>
                <input id="dLon" value="-71.553179" />
            </div>
            <div id="dirDestino" class="address-text"></div>
        </div>
    </div>

    <button onclick="consultar()">Calcular Ruta y Guardar</button>

    <div class="card results">
        <div class="stat">
            <span class="stat-val"><span id="dist">-</span> km</span>
            <small>Distancia total [cite: 139]</small>
        </div>
        <div class="stat">
            <span class="stat-val"><span id="tiempo">-</span> min</span>
            <small>Tiempo estimado [cite: 139]</small>
        </div>
    </div>

    <div class="card" style="margin-top: 20px;">
        <h3> Historial de Consultas (SQLite)</h3>
        <table id="tablaHistorial">
            <thead>
                <tr>
                    <th>Origen / Destino</th>
                    <th>Distancia</th>
                    <th>Fecha</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <p style="font-size:0.7em; color:#94a3b8; text-align:center; margin-top:20px;">
        Datos obtenidos de <a href="https://www.openstreetmap.org/copyright" target="_blank">OpenStreetMap [cite: 29, 174]</a>
    </p>
</div>

<script>
    async function consultar() {
        const btn = document.querySelector('button');
        btn.innerText = 'Consultando...';
        btn.disabled = true;

        const coords = {
            oLat: v('oLat'), oLon: v('oLon'),
            dLat: v('dLat'), dLon: v('dLon')
        };

        try {
            // Llamada al endpoint que calcula y guarda en BD [cite: 125, 128]
            const r = await api(`/api/ruta?oLat=${coords.oLat}&oLon=${coords.oLon}&dLat=${coords.dLat}&dLon=${coords.dLon}`);
            
            set('dirOrigen', r.origen);
            set('dirDestino', r.destino);
            set('dist', r.distancia_km);
            set('tiempo', r.duracion_min);

            await cargarHistorial(); // Actualizar tabla 
        } catch (e) {
            alert("Error al conectar con el servidor local [cite: 121]");
        } finally {
            btn.innerText = 'Calcular Ruta y Guardar';
            btn.disabled = false;
        }
    }

    async function cargarHistorial() {
        const data = await api('/api/historial');
        const tbody = document.querySelector('#tablaHistorial tbody');
        tbody.innerHTML = data.map(row => `
            <tr>
                <td>
                    <b>Desde:</b> ${row.origen_dir.substring(0,40)}...<br>
                    <b>Hacia:</b> ${row.destino_dir.substring(0,40)}...
                </td>
                <td>${row.distancia_km} km</td>
                <td>${new Date(row.fecha).toLocaleTimeString()}</td>
            </tr>
        `).join('');
    }

    const api = url => fetch(url).then(r => r.json());
    const v = id => document.getElementById(id).value;
    const set = (id, val) => document.getElementById(id).textContent = val;

    // Cargar historial al iniciar la página 
    window.onload = cargarHistorial;
</script>

</body>
</html>
