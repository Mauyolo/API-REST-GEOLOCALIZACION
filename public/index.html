<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GeoOSM - Dashboard</title>

    <!-- ✅ Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }

        body { 
            font-family: 'Segoe UI'; 
            background-color: var(--bg); 
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 800px; margin:auto; }

        .card { 
            background: var(--card); 
            padding: 20px; 
            border-radius: 12px; 
            margin-top: 20px;
        }

        input { width: 100%; padding: 8px; margin-bottom: 10px; }
        button { padding: 10px; width: 100%; background: var(--primary); color: white; border: none; }

        #map { height: 400px; margin-top:20px; }
    </style>
</head>

<body>

<div class="container">

    <h2>GeoOSM Express</h2>

    <h3>Origen</h3>
    <input id="oLat" value="-16.414005" />
    <input id="oLon" value="-71.515773" />

    <h3>Destino</h3>
    <input id="dLat" value="-16.406547" />
    <input id="dLon" value="-71.553179" />

    <button onclick="consultar()">Calcular Ruta y Guardar</button>

    <div class="card">
        <p>Distancia: <span id="dist">-</span> km</p>
        <p>Tiempo: <span id="tiempo">-</span> min</p>
    </div>

    <!-- ✅ MAPA (ANTES NO EXISTÍA) -->
    <div class="card">
        <h3>Mapa</h3>
        <div id="map"></div>
    </div>

    <div class="card">
        <h3>Historial</h3>
        <table id="tablaHistorial"></table>
    </div>

</div>

<!-- ✅ Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
    let map, marcadorOrigen, marcadorDestino, lineaRuta;

    // ✅ CORREGIDO: cargar todo después del DOM
    window.onload = () => {
        cargarHistorial();

        map = L.map('map').setView([-16.4090, -71.5375], 13);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);
    };

    async function consultar() {
        const coords = {
            oLat: v('oLat'),
            oLon: v('oLon'),
            dLat: v('dLat'),
            dLon: v('dLon')
        };

        try {
            const r = await api(`/api/ruta?oLat=${coords.oLat}&oLon=${coords.oLon}&dLat=${coords.dLat}&dLon=${coords.dLon}`);

            set('dist', r.distancia_km);
            set('tiempo', r.duracion_min);

            await cargarHistorial();

            // ✅ CORRECTO: aquí se dibuja
            await dibujarMapa(coords.oLat, coords.oLon, coords.dLat, coords.dLon);

        } catch (e) {
            alert("Error");
        }
    }

    async function dibujarMapa(oLat, oLon, dLat, dLon) {

        if (marcadorOrigen) map.removeLayer(marcadorOrigen);
        if (marcadorDestino) map.removeLayer(marcadorDestino);
        if (lineaRuta) map.removeLayer(lineaRuta);

        marcadorOrigen = L.marker([oLat, oLon]).addTo(map);
        marcadorDestino = L.marker([dLat, dLon]).addTo(map);

        const url = `https://router.project-osrm.org/route/v1/driving/${oLon},${oLat};${dLon},${dLat}?overview=full&geometries=geojson`;

        const res = await fetch(url);
        const data = await res.json();

        const coords = data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);

        lineaRuta = L.polyline(coords).addTo(map);

        map.fitBounds(lineaRuta.getBounds());
    }

    async function cargarHistorial() {
        const data = await api('/api/historial');
        const tabla = document.getElementById('tablaHistorial');

        tabla.innerHTML = data.map(row => `
            <tr>
                <td>${row.distancia_km} km</td>
                <td>${new Date(row.fecha).toLocaleTimeString()}</td>
            </tr>
        `).join('');
    }

    const api = url => fetch(url).then(r => r.json());
    const v = id => document.getElementById(id).value;
    const set = (id, val) => document.getElementById(id).textContent = val;
</script>

</body>
</html>
